project_name: changemonitor
builds:
  - main: ./cmd/changemonitor
  - env: [CGO_ENABLED=0]
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
dockers:
  - goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/ordspilleren/{{.ProjectName}}:latest"
      - "ghcr.io/ordspilleren/{{.ProjectName}}:{{ .Tag }}"
    dockerfile: Dockerfile
